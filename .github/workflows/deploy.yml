name: CI/CD Pipeline

# Trigger: push ke main/develop atau pull request ke main
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Environment variables global
env:
  REGISTRY: ghcr.io

jobs:
  # Job 1: Testing
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      # Clone repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Go environment
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: true

      # Download semua dependencies
      - name: Download dependencies
        run: go mod download

      # Jalankan semua tests
      - name: Run tests
        run: go test -v ./...

      # Static analysis
      - name: Run go vet
        run: go vet ./...


  # Job 2: Build Docker image (hanya untuk push ke main)
  build:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test  # Tunggu test selesai dulu
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write  # Permission untuk push ke registry
    outputs:
      image_name: ${{ steps.set_image.outputs.image_name }} 

    steps:
      # Clone repository
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: set_image
        run: |
          IMAGE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=$IMAGE" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.set_image.outputs.image_name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      # Build dan push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # Job 3: Deploy ke VPS (hanya untuk push ke main)
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build  # Tunggu build selesai dulu
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            cd /home/marst/server-go

            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            IMAGE_NAME=$(echo "${{ needs.build.outputs.image_name }}" | tr '[:upper:]' '[:lower:]')

            docker pull ghcr.io/${IMAGE_NAME}:latest

            export GITHUB_REPOSITORY=${IMAGE_NAME}

            docker compose down || true
            docker compose up -d
            docker image prune -af
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}